name: Build Host aapt2

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS (universal)
            artifact: aapt2-darwin
            build_args: universal
          - os: ubuntu-latest
            name: Linux (x86_64)
            artifact: aapt2-linux-x86_64
            build_args: ""
          - os: windows-latest
            name: Windows (x86_64)
            artifact: aapt2-windows-x86_64
            build_args: ""

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    # Windows 使用 MSYS2 的 bash
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}

    steps:
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: false
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-zlib
            unzip
            git
            patch

      # Windows 必须禁用 CRLF 转换，否则 git apply 补丁会因行尾不匹配而失败
      - name: Disable autocrlf (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # checkout action 可能仍然将文件转换为 CRLF，需要强制恢复为 LF
      - name: Normalize line endings (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config core.autocrlf false
          git checkout -- .
          git submodule foreach --recursive 'git config core.autocrlf false && git checkout -- .'

      # ---- protoc 21.12 ----
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-linux-x86_64.zip
          sudo unzip -j protoc-*.zip bin/protoc -d /usr/local/bin/

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sLO https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-osx-aarch_64.zip
          sudo unzip -j protoc-*.zip bin/protoc -d /usr/local/bin/

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -sLO https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-win64.zip
          unzip -j protoc-21.12-win64.zip bin/protoc.exe -d /clang64/bin/

      # ---- 构建依赖 ----
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zlib1g-dev clang

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      # ---- 打补丁 ----
      - name: Apply patches
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            ./patch_local.sh
          else
            ./patch.sh
          fi

      # ---- 构建版本号 ----
      - name: Set build number
        run: echo "AAPT2_BUILD_NUMBER=$(date +%Y%m%d)01" >> $GITHUB_ENV

      # ---- 编译 ----
      - name: Build
        run: |
          export PROTOC_PATH=$(which protoc)
          export AAPT2_BUILD_NUMBER=${{ env.AAPT2_BUILD_NUMBER }}
          # Linux 使用 Clang 编译，与 AOSP 代码兼容
          if [ "${{ runner.os }}" = "Linux" ]; then
            export CC=clang
            export CXX=clang++
          fi
          ./build_host.sh ${{ matrix.build_args }}

      # ---- macOS ad-hoc 签名（满足 Apple Silicon 内核强制签名要求）----
      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - build/bin/aapt2

      # ---- 验证 ----
      - name: Verify
        run: |
          file build/bin/aapt2*
          ./build/bin/aapt2* version

      # ---- 上传产物 ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/aapt2*
